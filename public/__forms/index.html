<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Netlify Forms</title>
  </head>
  <body>
    <!-- Deploy-time form detection for Netlify Next runtime -->
    <form name="portfolio-contact" data-netlify="true" hidden>
      <input type="hidden" name="form-name" value="portfolio-contact" />
      <input name="bot-field" />
      <input name="firstName" />
      <input name="lastName" />
      <input name="email" />
      <input name="phone" />
      <textarea name="message"></textarea>
    </form>
  </body>
</html>
