<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Netlify Forms</title>
  </head>
  <body>
    <!--
      Netlify Forms detection file.
      Required for @netlify/plugin-nextjs@5+ with Next.js runtime.
      Do not link to this page; it exists only so Netlify can detect forms at build time.
    -->

    <form name="portfolio-contact" data-netlify="true" hidden>
      <input type="hidden" name="form-name" value="portfolio-contact" />
      <input name="bot-field" />
      <input name="firstName" />
      <input name="lastName" />
      <input name="email" />
      <input name="phone" />
      <textarea name="message"></textarea>
    </form>
  </body>
</html>
